name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  linux-x64:
    name: Linux x64
    runs-on: ubuntu-22.04
    env:
      NPM_ARCH: x64
      VSCODE_ARCH: x64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install system deps
        run: |
          sudo apt update -y
          sudo apt install -y build-essential pkg-config libx11-dev libx11-xcb-dev libxkbfile-dev libkrb5-dev libsecret-1-dev libnotify-bin libgtk-3-0 libxss1

      - name: Install dependencies
        run: |
          for i in 1 2 3 4 5; do npm ci && break; sleep 5; done
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Download built-in extensions
        run: node build/lib/builtInExtensions.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npm run gulp vscode-linux-x64

      - name: Package build
        run: |
          ls -la ../VSCode-linux-x64/ | head -5
          mkdir -p downloads
          tar -czf downloads/autopilot-linux-x64.tar.gz -C ../VSCode-linux-x64 .

      - uses: actions/upload-artifact@v7
        with:
          name: autopilot-linux-x64
          path: downloads/
          if-no-files-found: error

  macos-arm64:
    name: macOS ARM64
    runs-on: macos-latest
    env:
      NPM_ARCH: arm64
      VSCODE_ARCH: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: |
          python3 -m pip install --break-system-packages setuptools 2>/dev/null || true
          for i in 1 2 3 4 5; do npm ci && break; sleep 5; done
        env:
          npm_config_arch: arm64
          VSCODE_ARCH: arm64
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          GYP_DEFINES: "kerberos_use_rtld=false"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download built-in extensions
        run: node build/lib/builtInExtensions.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npm run gulp vscode-darwin-arm64

      - name: Package build
        run: |
          ls -la ../VSCode-darwin-arm64/ | head -5
          mkdir -p downloads
          ditto -c -k --sequesterRsrc --keepParent ../VSCode-darwin-arm64 downloads/autopilot-darwin-arm64.zip

      - uses: actions/upload-artifact@v7
        with:
          name: autopilot-darwin-arm64
          path: downloads/
          if-no-files-found: error

  macos-x64:
    name: macOS x64
    runs-on: macos-latest
    env:
      NPM_ARCH: x64
      VSCODE_ARCH: x64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: |
          python3 -m pip install --break-system-packages setuptools 2>/dev/null || true
          for i in 1 2 3 4 5; do npm ci && break; sleep 5; done
        env:
          npm_config_arch: x64
          VSCODE_ARCH: x64
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          GYP_DEFINES: "kerberos_use_rtld=false"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download built-in extensions
        run: node build/lib/builtInExtensions.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npm run gulp vscode-darwin-x64

      - name: Package build
        run: |
          ls -la ../VSCode-darwin-x64/ | head -5
          mkdir -p downloads
          ditto -c -k --sequesterRsrc --keepParent ../VSCode-darwin-x64 downloads/autopilot-darwin-x64.zip

      - uses: actions/upload-artifact@v7
        with:
          name: autopilot-darwin-x64
          path: downloads/
          if-no-files-found: error

  windows-x64:
    name: Windows x64
    runs-on: windows-2022
    env:
      NPM_ARCH: x64
      VSCODE_ARCH: x64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          for ($i = 1; $i -le 5; $i++) {
            try {
              npm ci
              break
            } catch {
              if ($i -eq 5) { throw }
              Write-Host "npm ci failed attempt $i, retrying..."
              Start-Sleep -Seconds 5
            }
          }
        env:
          npm_config_arch: x64
          VSCODE_ARCH: x64
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Download built-in extensions
        shell: pwsh
        run: node build/lib/builtInExtensions.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        shell: pwsh
        run: npm run gulp "vscode-win32-x64"

      - name: Package build
        shell: pwsh
        run: |
          Get-ChildItem ..\VSCode-win32-x64\ -Name | Select-Object -First 5
          mkdir downloads -Force
          Compress-Archive -Path ..\VSCode-win32-x64\* -DestinationPath downloads\autopilot-win32-x64.zip

      - uses: actions/upload-artifact@v7
        with:
          name: autopilot-win32-x64
          path: downloads/
          if-no-files-found: error

  release:
    name: Create Release
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [linux-x64, macos-arm64, macos-x64, windows-x64]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.6.0
          name: "Autopilot v0.6.0"
          body: |
            ## Autopilot v0.6.0

            ### Changes
            - **Fix "Server error: 500" for real**: The LocalLanguageModelProvider was using only Node.js `http` module, which cannot reach HTTPS endpoints like `api.openai.com` or `api.anthropic.com`. Model discovery and chat requests to any HTTPS OpenAI-compatible endpoint silently failed, leaving only Ollama (localhost/HTTP) working. Now imports `https` module and correctly routes based on URL protocol.
            - **URL resolution fixed**: `OPENAI_BASE_URL=https://api.openai.com/v1` now correctly resolves to `/v1/chat/completions` for chat and `/v1/models` for discovery instead of double-appending paths like `/v1/chat/completions` (was becoming `/v1/chat/completions` via `new URL()` which drops the path).
            - **Graceful model fallback**: When a non-local model ID is selected in local-only mode, instead of throwing an error, Autopilot now tries to match by ID or family name against available local models, falling back to the first available local model.
            - **ProviderConfig type fix**: `providers.json` `type` field now accepts `'anthropic'` in addition to `'openai'`, matching the runtime behavior of `customChatResponse`.
            - **System messages preserved**: `extractMessages` now correctly maps `system` role messages instead of collapsing them to `user`.

            ### Downloads
            - [Linux x64](autopilot-linux-x64.tar.gz)
            - [macOS ARM64](autopilot-darwin-arm64.zip)
            - [macOS x64](autopilot-darwin-x64.zip)
            - [Windows x64](autopilot-win32-x64.zip)
          files: |
            autopilot-linux-x64/autopilot-linux-x64.tar.gz
            autopilot-darwin-arm64/autopilot-darwin-arm64.zip
            autopilot-darwin-x64/autopilot-darwin-x64.zip
            autopilot-win32-x64/autopilot-win32-x64.zip
          draft: true
          prerelease: false
