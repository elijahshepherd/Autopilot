name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  linux-x64:
    name: Linux x64
    runs-on: ubuntu-22.04
    env:
      NPM_ARCH: x64
      VSCODE_ARCH: x64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install system deps
        run: |
          sudo apt update -y
          sudo apt install -y build-essential pkg-config libx11-dev libx11-xcb-dev libxkbfile-dev libkrb5-dev libsecret-1-dev libnotify-bin libgtk-3-0 libxss1

      - name: Install dependencies
        run: |
          for i in 1 2 3 4 5; do npm ci && break; sleep 5; done
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Download built-in extensions
        run: node build/lib/builtInExtensions.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npm run gulp vscode-linux-x64

      - name: Package build
        run: |
          ls -la ../VSCode-linux-x64/ | head -5
          mkdir -p downloads
          tar -czf downloads/autopilot-linux-x64.tar.gz -C ../VSCode-linux-x64 .

      - uses: actions/upload-artifact@v7
        with:
          name: autopilot-linux-x64
          path: downloads/
          if-no-files-found: error

  macos-arm64:
    name: macOS ARM64
    runs-on: macos-latest
    env:
      NPM_ARCH: arm64
      VSCODE_ARCH: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: |
          python3 -m pip install --break-system-packages setuptools 2>/dev/null || true
          for i in 1 2 3 4 5; do npm ci && break; sleep 5; done
        env:
          npm_config_arch: arm64
          VSCODE_ARCH: arm64
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          GYP_DEFINES: "kerberos_use_rtld=false"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download built-in extensions
        run: node build/lib/builtInExtensions.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npm run gulp vscode-darwin-arm64

      - name: Package build
        run: |
          ls -la ../VSCode-darwin-arm64/ | head -5
          mkdir -p downloads
          ditto -c -k --sequesterRsrc --keepParent ../VSCode-darwin-arm64 downloads/autopilot-darwin-arm64.zip

      - uses: actions/upload-artifact@v7
        with:
          name: autopilot-darwin-arm64
          path: downloads/
          if-no-files-found: error

  macos-x64:
    name: macOS x64
    runs-on: macos-latest
    env:
      NPM_ARCH: x64
      VSCODE_ARCH: x64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: |
          python3 -m pip install --break-system-packages setuptools 2>/dev/null || true
          for i in 1 2 3 4 5; do npm ci && break; sleep 5; done
        env:
          npm_config_arch: x64
          VSCODE_ARCH: x64
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          GYP_DEFINES: "kerberos_use_rtld=false"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download built-in extensions
        run: node build/lib/builtInExtensions.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npm run gulp vscode-darwin-x64

      - name: Package build
        run: |
          ls -la ../VSCode-darwin-x64/ | head -5
          mkdir -p downloads
          ditto -c -k --sequesterRsrc --keepParent ../VSCode-darwin-x64 downloads/autopilot-darwin-x64.zip

      - uses: actions/upload-artifact@v7
        with:
          name: autopilot-darwin-x64
          path: downloads/
          if-no-files-found: error

  windows-x64:
    name: Windows x64
    runs-on: windows-2022
    env:
      NPM_ARCH: x64
      VSCODE_ARCH: x64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          for ($i = 1; $i -le 5; $i++) {
            try {
              npm ci
              break
            } catch {
              if ($i -eq 5) { throw }
              Write-Host "npm ci failed attempt $i, retrying..."
              Start-Sleep -Seconds 10
            }
          }
        env:
          npm_config_arch: x64
          VSCODE_ARCH: x64
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download built-in extensions
        shell: pwsh
        run: node build/lib/builtInExtensions.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        shell: pwsh
        run: npm run gulp "vscode-win32-x64"

      - name: Package build
        shell: pwsh
        run: |
          Get-ChildItem ..\VSCode-win32-x64\ -Name | Select-Object -First 5
          mkdir downloads -Force
          Compress-Archive -Path ..\VSCode-win32-x64\* -DestinationPath downloads\autopilot-win32-x64.zip

      - uses: actions/upload-artifact@v7
        with:
          name: autopilot-win32-x64
          path: downloads/
          if-no-files-found: error

  release:
    name: Create Release
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [linux-x64, macos-arm64, macos-x64, windows-x64]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.9.0
          name: "Autopilot v0.9.0"
          body: |
            ## Autopilot v0.9.0

            ### Tooling, prompts, and chat hygiene
            - **Reasoning is now collapsible, never leaked**: OpenAI `reasoning_content` and Anthropic `thinking_delta` are routed through the proper `LanguageModelThinkingPart`, so VS Code renders them as the standard collapsible "thinking" disclosure. Hidden reasoning blocks (`<thinking>`, `<reasoning>`, `<think>`) that some open-source models emit as plain text are scrubbed from the assistant message body.
            - **Malformed tool outputs are dropped, not shown**: Tool-call envelopes, `questions` arrays, surveys, and similar JSON payloads that occasionally leak from low-quality model output are detected and stripped before they reach the UI.
            - **Agent capability manifest**: Each request now carries a startup system message that lists the exact tools Auto-mode has available (file edits, terminal commands, search, fetch, workspace ops, etc.). The AI no longer claims features are unavailable when they're enabled.
            - **Bounded rate-limit handling**: 429 responses now retry at most once with a 30-second ceiling, then surface a friendly user-visible error (`Autopilot rate limit reached. Please try again shortly.`) — no infinite loops, no exponential growth, no endless thinking animations.
            - **Empty-stream safeguard**: If a model returns an empty stream, the user no longer sees a silent turn — Autopilot shows a clear `(the model produced no output for this request)` notice.

            ### Infrastructure
            - **Streaming hardened**: Streaming responses now run via `LanguageModelResponsePart2`, matching the BYOK providers (Anthropic/Gemini) so reasoning/tool parts are passed through cleanly.
            - **Improved chat-status UI**: Removed "Autopilot AI Status", "Use AI Features", "Sign In", and other title-cased strings in favor of sentence-case labels per Autopilot standards.
            - **Account menu hidden by default, toggleable**: The Accounts icon restored as a user-toggleable command (`workbench.accounts.visible` workspace-storage key). Default is hidden since sign-in is optional.
            - **Auto-retry ceiling reduced** in `toolCallingLoop` (3→2) so transient errors recover faster without runaway waiting periods.

            ### Workspace modes — Fliers
            - **Fliers**: Domain-focused workspace modes. Drop a `.autopilot/flier.json` file at the workspace root containing `{ "id": "roblox" }` to enable the Roblox development flier, or load a custom `.autopilot/fliers/<id>.md` to define your own.
            - **Built-in Roblox flier**: A comprehensive Lua/Roblox Studio/Rojo/Wally-flavored system prompt that convinces the model to behave as a Roblox development specialist (modules, scripts, services, optimization, asset/audio considerations). The flier also exposes specialized sub-agents **Jessie — the builder** and **Jack — Audio Pro** for context-aware multi-turn use.

            ### Downloads
            - [Linux x64](autopilot-linux-x64.tar.gz)
            - [macOS ARM64](autopilot-darwin-arm64.zip)
            - [macOS x64](autopilot-darwin-x64.zip)
            - [Windows x64](autopilot-win32-x64.zip)
          files: |
            autopilot-linux-x64/autopilot-linux-x64.tar.gz
            autopilot-darwin-arm64/autopilot-darwin-arm64.zip
            autopilot-darwin-x64/autopilot-darwin-x64.zip
            autopilot-win32-x64/autopilot-win32-x64.zip
          draft: true
          prerelease: false
